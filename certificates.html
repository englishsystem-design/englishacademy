<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sertifikat — English Academy Indonesia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <a href="#ea-main" class="skip-link">Langsung ke konten</a>
  <div id="ea-navbar"></div>
  <main id="ea-main" class="container py-4">
    <h1 class="h3 mb-4">Sertifikat Saya</h1>
    <div id="loadingState" class="ea-loading"><div class="spinner-border text-primary" role="status"></div></div>
    <div id="certList" class="row g-3 d-none"></div>
    <p id="emptyState" class="text-muted d-none">Belum ada sertifikat. Selesaikan modul untuk mendapatkan sertifikat dari gurumu.</p>
  </main>
  <div id="ea-footer"></div>
  <script src="config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    var session = eaRequireLogin(['student']);
    if (session) {
      eaIncludeHTML('#ea-navbar', 'partials/navbar.html', function () { eaRenderNav(session); });
      eaIncludeHTML('#ea-footer', 'partials/footer.html');
      EA.api('listMyCertificates', [session.token])
        .then(function (certs) {
          document.getElementById('loadingState').classList.add('d-none');
          if (certs.length === 0) { document.getElementById('emptyState').classList.remove('d-none'); return; }
          var list = document.getElementById('certList');
          list.classList.remove('d-none');
          list.innerHTML = certs.map(function (c) {
            return '<div class="col-md-6 col-lg-4"><div class="ea-card p-4 text-center">' +
              '<i class="bi bi-award" style="font-size:2.5rem;color:var(--ea-accent);"></i>' +
              '<h5 class="mt-2 mb-1">' + c.CertificateNumber + '</h5>' +
              '<p class="small text-muted mb-3">Diterbitkan ' + new Date(c.IssueDate).toLocaleDateString('id-ID') + '</p>' +
              '<a href="' + c.pdfUrl + '" target="_blank" class="btn btn-sm btn-ea-primary">Lihat / Unduh PDF</a>' +
              '</div></div>';
          }).join('');
        });
    }
  </script>
</body>
</html>
