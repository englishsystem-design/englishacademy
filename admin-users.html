<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manajemen Pengguna — English Academy Indonesia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="assets/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
</head>
<body>
  <a href="#ea-main" class="skip-link">Langsung ke konten</a>
  <div id="ea-navbar"></div>
  <main id="ea-main" class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
      <h1 class="h3 mb-0">Manajemen Pengguna</h1>
      <div class="d-flex gap-2">
        <a href="import-students.html" class="btn btn-outline-primary">
          <i class="bi bi-file-earmark-arrow-up me-1"></i>Import Siswa (Excel/CSV)
        </a>
        <button class="btn btn-ea-primary" onclick="createUserFlow()">
          <i class="bi bi-person-plus me-1"></i>Tambah Pengguna
        </button>
      </div>
    </div>
    <div class="ea-card p-4">
      <table id="usersTable" class="table table-striped w-100">
        <thead><tr><th>Nama</th><th>Username</th><th>Peran</th><th>Status</th><th>Aksi</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </main>
  <div id="ea-footer"></div>
  <script src="config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    var session = eaRequireLogin(['admin']);
    var dataTable;
    if (session) {
      eaIncludeHTML('#ea-navbar', 'partials/navbar.html', function () { eaRenderNav(session); });
      eaIncludeHTML('#ea-footer', 'partials/footer.html');
      loadUsers();
    }

    function loadUsers() {
      EA.api('listUsers', [session.token, null]).then(function (users) {
        var rows = users.map(function (u) {
          var sb = u.Status === 'active'
            ? '<span class="badge bg-success-subtle text-success">Aktif</span>'
            : '<span class="badge bg-secondary-subtle text-secondary">Nonaktif</span>';
          var tgl = u.Status === 'active' ? 'Nonaktifkan' : 'Aktifkan';
          var actions =
            '<button class="btn btn-sm btn-outline-secondary me-1" onclick="toggleStatus(\'' + u.UserID + '\',\'' + u.Status + '\')">' + tgl + '</button>' +
            '<button class="btn btn-sm btn-outline-secondary me-1" onclick="resetPasswordFlow(\'' + u.UserID + '\')">Reset PW</button>' +
            '<button class="btn btn-sm btn-outline-danger" onclick="deleteUserFlow(\'' + u.UserID + '\')">Hapus</button>';
          return [u.FullName, u.Username, u.Role, sb, actions];
        });
        if (dataTable) dataTable.destroy();
        dataTable = $('#usersTable').DataTable({ data: rows, columns: [{},{},{},{},{}], pageLength: 10 });
      });
    }

    function createUserFlow() {
      Swal.fire({
        title: 'Pengguna Baru',
        html:
          '<input id="sName" class="form-control mb-2" placeholder="Nama Lengkap">' +
          '<input id="sUser" class="form-control mb-2" placeholder="Username">' +
          '<input id="sEmail" class="form-control mb-2" placeholder="Email (opsional)">' +
          '<input id="sPw" type="password" class="form-control mb-2" placeholder="Password (min. 8 karakter)">' +
          '<select id="sRole" class="form-select"><option value="student">Siswa</option><option value="teacher">Guru</option><option value="admin">Admin</option></select>',
        confirmButtonText: 'Buat Akun', showCancelButton: true
      }).then(function (r) {
        if (!r.isConfirmed) return;
        var payload = {
          fullName: document.getElementById('sName').value,
          username: document.getElementById('sUser').value,
          email: document.getElementById('sEmail').value,
          password: document.getElementById('sPw').value,
          role: document.getElementById('sRole').value
        };
        EA.api('createUserAccount', [session.token, payload]).then(function (res) {
          if (!res.success) { eaToast('error', res.message); return; }
          eaToast('success', 'Akun dibuat');
          if (payload.role === 'student') createStudentProfileFlow(res.user.UserID);
          else if (payload.role === 'teacher') createTeacherProfileFlow(res.user.UserID);
          else loadUsers();
        });
      });
    }

    function createStudentProfileFlow(userId) {
      Swal.fire({
        title: 'Profil Siswa',
        html: '<select id="sKelas" class="form-select mb-2"><option value="X">Kelas X</option><option value="XI">Kelas XI</option><option value="XII">Kelas XII</option></select>' +
          '<input id="sClassId" class="form-control mb-2" placeholder="Class ID (opsional)">' +
          '<input id="sNisn" class="form-control" placeholder="NISN (opsional)">',
        confirmButtonText: 'Simpan', showCancelButton: true
      }).then(function (r) {
        if (!r.isConfirmed) { loadUsers(); return; }
        EA.api('createStudentProfile', [session.token, {
          userId: userId, kelas: document.getElementById('sKelas').value,
          classId: document.getElementById('sClassId').value, nisn: document.getElementById('sNisn').value
        }]).then(function () { eaToast('success', 'Profil siswa dibuat'); loadUsers(); });
      });
    }

    function createTeacherProfileFlow(userId) {
      Swal.fire({
        title: 'Profil Guru',
        html: '<input id="sNip" class="form-control mb-2" placeholder="NIP (opsional)">' +
          '<input id="sSubj" class="form-control" placeholder="Mata Pelajaran" value="English">',
        confirmButtonText: 'Simpan', showCancelButton: true
      }).then(function (r) {
        if (!r.isConfirmed) { loadUsers(); return; }
        EA.api('createTeacherProfile', [session.token, {
          userId: userId, nip: document.getElementById('sNip').value, subject: document.getElementById('sSubj').value
        }]).then(function () { eaToast('success', 'Profil guru dibuat'); loadUsers(); });
      });
    }

    function toggleStatus(userId, currentStatus) {
      var fn = currentStatus === 'active' ? 'disableUser' : 'enableUser';
      EA.api(fn, [session.token, userId]).then(function (r) {
        if (r.success) { eaToast('success', 'Status diperbarui'); loadUsers(); } else eaToast('error', r.message);
      });
    }

    function resetPasswordFlow(userId) {
      Swal.fire({ title: 'Reset Password', input: 'password', inputLabel: 'Password baru (min. 8 karakter)', confirmButtonText: 'Simpan', showCancelButton: true })
        .then(function (r) {
          if (!r.isConfirmed || !r.value) return;
          EA.api('resetPassword', [session.token, userId, r.value]).then(function (res) {
            if (res.success) eaToast('success', 'Password direset'); else eaToast('error', res.message);
          });
        });
    }

    function deleteUserFlow(userId) {
      Swal.fire({ title: 'Hapus akun ini?', text: 'Tidak dapat dibatalkan.', icon: 'warning', showCancelButton: true, confirmButtonText: 'Hapus' })
        .then(function (r) {
          if (!r.isConfirmed) return;
          EA.api('deleteUserAccount', [session.token, userId]).then(function (res) {
            if (res.success) { eaToast('success', 'Akun dihapus'); loadUsers(); } else eaToast('error', res.message);
          });
        });
    }
  </script>
</body>
</html>
