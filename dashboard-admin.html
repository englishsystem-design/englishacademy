<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Admin — English Academy Indonesia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <a href="#ea-main" class="skip-link">Langsung ke konten</a>
  <div id="ea-navbar"></div>
  <main id="ea-main" class="container py-4">
    <div id="loadingState" class="ea-loading"><div class="spinner-border text-primary" role="status"></div></div>
    <div id="contentState" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div><h1 class="h3 mb-1">Dashboard Admin</h1><p class="text-muted mb-0">Ringkasan keseluruhan sistem.</p></div>
        <a href="admin-users.html" class="btn btn-ea-primary"><i class="bi bi-person-plus me-1"></i>Kelola Pengguna</a>
      </div>
      <div class="row g-3 mb-4">
        <div class="col-6 col-lg-3"><div class="ea-card ea-stat-card"><div class="ea-stat-value" id="statStudents">-</div><div class="ea-stat-label">Total Siswa</div></div></div>
        <div class="col-6 col-lg-3"><div class="ea-card ea-stat-card"><div class="ea-stat-value" id="statTeachers">-</div><div class="ea-stat-label">Total Guru</div></div></div>
        <div class="col-6 col-lg-3"><div class="ea-card ea-stat-card"><div class="ea-stat-value" id="statClasses">-</div><div class="ea-stat-label">Kelas Aktif</div></div></div>
        <div class="col-6 col-lg-3"><div class="ea-card ea-stat-card"><div class="ea-stat-value" id="statCerts">-</div><div class="ea-stat-label">Sertifikat Terbit</div></div></div>
      </div>
      <div class="row g-3 mb-4">
        <div class="col-6 col-lg-4"><div class="ea-card ea-stat-card"><div class="ea-stat-value" id="statLessons">-</div><div class="ea-stat-label">Materi Pelajaran</div></div></div>
        <div class="col-6 col-lg-4"><div class="ea-card ea-stat-card"><div class="ea-stat-value" id="statQuizzes">-</div><div class="ea-stat-label">Kuis Dibuat</div></div></div>
        <div class="col-6 col-lg-4"><div class="ea-card ea-stat-card"><div class="ea-stat-value" id="statExams">-</div><div class="ea-stat-label">Ujian Dibuat</div></div></div>
      </div>
      <div class="ea-card p-4">
        <h2 class="h5 mb-3">Aktivitas Terbaru</h2>
        <div class="table-responsive">
          <table class="table table-sm align-middle">
            <thead><tr><th>Waktu</th><th>Pengguna</th><th>Aksi</th><th>Detail</th></tr></thead>
            <tbody id="activityBody"></tbody>
          </table>
        </div>
        <p id="activityEmpty" class="text-muted small d-none">Belum ada aktivitas tercatat.</p>
      </div>
    </div>
  </main>
  <div id="ea-footer"></div>
  <script src="config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    var session = eaRequireLogin(['admin']);
    if (session) {
      eaIncludeHTML('#ea-navbar', 'partials/navbar.html', function () { eaRenderNav(session); });
      eaIncludeHTML('#ea-footer', 'partials/footer.html');
      EA.api('getAdminDashboardStats', [session.token])
        .then(function (stats) {
          document.getElementById('loadingState').classList.add('d-none');
          document.getElementById('contentState').classList.remove('d-none');
          document.getElementById('statStudents').textContent = stats.totalStudents;
          document.getElementById('statTeachers').textContent = stats.totalTeachers;
          document.getElementById('statClasses').textContent = stats.totalClasses;
          document.getElementById('statCerts').textContent = stats.totalCertificatesIssued;
          document.getElementById('statLessons').textContent = stats.totalLessons;
          document.getElementById('statQuizzes').textContent = stats.totalQuizzes;
          document.getElementById('statExams').textContent = stats.totalExams;
          if (stats.recentActivities.length === 0) {
            document.getElementById('activityEmpty').classList.remove('d-none');
          } else {
            document.getElementById('activityBody').innerHTML = stats.recentActivities.map(function (a) {
              return '<tr><td class="text-muted small">' + new Date(a.Timestamp).toLocaleString('id-ID') + '</td>' +
                '<td class="small">' + (a.UserID || '-') + '</td>' +
                '<td><span class="badge bg-light text-dark">' + a.Action + '</span></td>' +
                '<td class="small text-muted">' + (a.Details || '') + '</td></tr>';
            }).join('');
          }
        })
        .catch(function (err) {
          document.getElementById('loadingState').classList.add('d-none');
          eaToast('error', 'Gagal memuat dashboard.');
          console.error(err);
        });
    }
  </script>
</body>
</html>
