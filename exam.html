<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ujian — English Academy Indonesia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <a href="#ea-main" class="skip-link">Langsung ke konten</a>
  <div id="ea-navbar"></div>
  <main id="ea-main" class="container py-4" style="max-width:760px;">
    <div id="loadingState" class="ea-loading"><div class="spinner-border text-primary" role="status"></div></div>
    <div id="errorState" class="ea-card p-4 text-center d-none"><p class="mb-0" id="errorMessage"></p><a href="lessons.html" class="btn btn-outline-primary mt-3">Kembali</a></div>
    <div id="examState" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-3 sticky-top bg-white py-2" style="top:64px;z-index:10;">
        <h1 class="h4 mb-0" id="examTitle"></h1>
        <span class="badge bg-danger fs-6" id="examTimer">--:--</span>
      </div>
      <div class="alert alert-warning small d-none" id="antiCheatNotice"><i class="bi bi-shield-exclamation me-1"></i>Jangan berpindah tab selama ujian — sistem mencatat aktivitas ini.</div>
      <p class="text-muted" id="examInstructions"></p>
      <div id="questionsContainer"></div>
      <button class="btn btn-ea-primary px-4" onclick="submitExam(false)">Kumpulkan Ujian</button>
    </div>
    <div id="resultState" class="d-none text-center">
      <div class="ea-card p-5">
        <h1 class="display-5" id="resultPercentage"></h1>
        <p class="text-muted" id="resultNote"></p>
        <a href="lessons.html" class="btn btn-ea-primary mt-3">Kembali ke Materi</a>
      </div>
    </div>
  </main>
  <div id="ea-footer"></div>
  <script src="config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    var session = eaRequireLogin(['student']);
    var params = eaGetUrlParams();
    var examId = params.examId;
    var currentAttemptId, deadlineAt, timerInterval, autoSaveInterval, submitted = false;

    if (session) {
      eaIncludeHTML('#ea-navbar', 'partials/navbar.html', function () { eaRenderNav(session); });
      eaIncludeHTML('#ea-footer', 'partials/footer.html');
      if (!examId) { showError('ID ujian tidak ditemukan.'); }
      else {
        EA.api('startExamAttempt', [session.token, examId])
          .then(function (data) {
            document.getElementById('loadingState').classList.add('d-none');
            document.getElementById('examState').classList.remove('d-none');
            currentAttemptId = data.attemptId;
            deadlineAt = new Date(data.deadlineAt).getTime();
            document.getElementById('examTitle').textContent = data.exam.Title;
            document.getElementById('examInstructions').textContent = data.exam.Instructions || '';
            document.getElementById('antiCheatNotice').classList.toggle('d-none', !data.antiCheatWarning);
            document.getElementById('questionsContainer').innerHTML = data.questions.map(function (q, i) { return renderQ(q, i); }).join('');
            startTimer();
            autoSaveInterval = setInterval(autoSave, 30000);
            if (data.antiCheatWarning) {
              document.addEventListener('visibilitychange', function () {
                if (document.hidden && !submitted) EA.api('logExamCheatWarning', [session.token, examId, currentAttemptId, 'tab_hidden']);
              });
            }
            window.addEventListener('beforeunload', function (e) { if (!submitted) { e.preventDefault(); e.returnValue = ''; } });
          })
          .catch(function (err) { showError((err && err.message) || 'Ujian tidak tersedia.'); });
      }
    }

    function showError(msg) {
      document.getElementById('loadingState').classList.add('d-none');
      document.getElementById('errorState').classList.remove('d-none');
      document.getElementById('errorMessage').textContent = msg;
    }

    function renderQ(q, idx) {
      var h = '<div class="ea-card p-4 mb-3"><p class="fw-semibold mb-3">' + (idx+1) + '. ' + q.QuestionText + '</p>';
      if (q.QuestionType === 'mc' || q.QuestionType === 'tf') {
        var opts = q.QuestionType === 'tf' ? ['True','False'] : (q.Options.choices||[]);
        h += opts.map(function (o) { return '<div class="form-check"><input class="form-check-input" type="radio" name="q_' + q.QuestionID + '" value="' + o + '"><label class="form-check-label">' + o + '</label></div>'; }).join('');
      } else if (q.QuestionType === 'mr') {
        h += (q.Options.choices||[]).map(function (o) { return '<div class="form-check"><input class="form-check-input" type="checkbox" name="q_' + q.QuestionID + '" value="' + o + '"><label class="form-check-label">' + o + '</label></div>'; }).join('');
      } else if (q.QuestionType === 'fillblank') {
        h += '<input type="text" class="form-control" name="q_' + q.QuestionID + '" placeholder="Jawabanmu...">';
      } else {
        h += '<textarea class="form-control" name="q_' + q.QuestionID + '" rows="5" placeholder="Tulis jawabanmu..."></textarea>';
      }
      return h + '</div>';
    }

    function startTimer() {
      timerInterval = setInterval(function () {
        var rem = deadlineAt - Date.now();
        if (rem <= 0) { clearInterval(timerInterval); document.getElementById('examTimer').textContent = '00:00'; eaToast('warning', 'Waktu habis — ujian dikumpulkan otomatis.'); submitExam(true); return; }
        var s = Math.floor(rem/1000), mm = String(Math.floor(s/60)).padStart(2,'0'), ss = String(s%60).padStart(2,'0');
        document.getElementById('examTimer').textContent = mm + ':' + ss;
      }, 1000);
    }

    function collectAnswers() {
      var answers = [], seen = {};
      document.querySelectorAll('[name^="q_"]').forEach(function (el) {
        var qId = el.name.replace('q_','');
        if (seen[qId]) return; seen[qId] = true;
        var ans;
        if (el.type === 'radio') { var c = document.querySelector('[name="' + el.name + '"]:checked'); ans = { selected: c ? c.value : null }; }
        else if (el.type === 'checkbox') { var cs = document.querySelectorAll('[name="' + el.name + '"]:checked'); ans = { selected: Array.from(cs).map(function (x) { return x.value; }) }; }
        else { ans = { text: el.value }; }
        answers.push({ questionId: qId, studentAnswer: ans });
      });
      return answers;
    }

    function autoSave() { if (!submitted) EA.api('autoSaveExamProgress', [session.token, currentAttemptId, collectAnswers()]); }

    function submitExam(isAuto) {
      if (submitted) return; submitted = true;
      clearInterval(timerInterval); clearInterval(autoSaveInterval);
      EA.api('submitExamAttempt', [session.token, examId, currentAttemptId, collectAnswers(), !!isAuto])
        .then(function (res) {
          if (!res.success) { eaToast('error', res.message); submitted = false; return; }
          document.getElementById('examState').classList.add('d-none');
          document.getElementById('resultState').classList.remove('d-none');
          document.getElementById('resultPercentage').textContent = res.score.Percentage + '%';
          document.getElementById('resultNote').textContent = res.score.GradingStatus === 'pending_manual' ? 'Sebagian soal esai menunggu penilaian guru.' : 'Ujian telah dinilai otomatis.';
        })
        .catch(function (err) { eaToast('error', 'Gagal mengumpulkan ujian. Hubungi guru jika masalah berlanjut.'); console.error(err); });
    }
  </script>
</body>
</html>
