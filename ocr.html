<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OCR — English Academy Indonesia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
  <a href="#ea-main" class="skip-link">Langsung ke konten</a>
  <div id="ea-navbar"></div>
  <main id="ea-main" class="container py-4" style="max-width:760px;">
    <h1 class="h3 mb-1">OCR — Foto ke Teks</h1>
    <p class="text-muted mb-4">Foto halaman buku, tulisan tangan, atau papan tulis — diubah jadi teks. Diproses langsung di browser kamu, tidak diunggah ke server mana pun.</p>
    <div class="ea-card p-4 mb-4">
      <input type="file" id="imageInput" accept="image/jpeg,image/png,image/webp" class="form-control mb-3">
      <img id="imagePreview" class="img-fluid rounded mb-3 d-none" style="max-height:300px;">
      <button class="btn btn-ea-primary" id="ocrButton" onclick="runOcr()" disabled>Mulai OCR</button>
      <div id="ocrProgress" class="mt-3 d-none">
        <div class="progress"><div class="progress-bar" id="ocrProgressBar" style="width:0%"></div></div>
        <p class="small text-muted mt-1" id="ocrProgressLabel">Memuat...</p>
      </div>
    </div>
    <div class="ea-card p-4 d-none" id="resultCard">
      <h2 class="h6 mb-2">Hasil Teks</h2>
      <textarea id="ocrResult" class="form-control mb-3" rows="8"></textarea>
      <div class="d-flex flex-wrap gap-2">
        <button class="btn btn-sm btn-outline-secondary" onclick="copyResult()"><i class="bi bi-clipboard me-1"></i>Salin</button>
        <button class="btn btn-sm btn-outline-secondary" onclick="downloadTxt()"><i class="bi bi-download me-1"></i>Unduh .txt</button>
        <button class="btn btn-sm btn-ea-primary" onclick="translateResult()"><i class="bi bi-translate me-1"></i>Terjemahkan ke Indonesia</button>
      </div>
      <div id="translationBox" class="alert alert-light border mt-3 d-none"></div>
    </div>
  </main>
  <div id="ea-footer"></div>
  <script src="config.js"></script><script src="assets/js/api.js"></script><script src="assets/js/app.js"></script>
  <script>
    var session = eaRequireLogin(['admin','teacher','student']);
    if (session) {
      eaIncludeHTML('#ea-navbar','partials/navbar.html',function(){eaRenderNav(session);});
      eaIncludeHTML('#ea-footer','partials/footer.html');
    }
    document.getElementById('imageInput').addEventListener('change', function (e) {
      var f = e.target.files[0]; if (!f) return;
      var preview = document.getElementById('imagePreview');
      preview.src = URL.createObjectURL(f); preview.classList.remove('d-none');
      document.getElementById('ocrButton').disabled = false;
    });
    function runOcr() {
      var f = document.getElementById('imageInput').files[0]; if (!f) return;
      document.getElementById('ocrButton').disabled = true;
      document.getElementById('ocrProgress').classList.remove('d-none');
      Tesseract.recognize(f, 'eng', { logger: function (m) {
        if (m.status==='recognizing text') {
          var pct = Math.round(m.progress*100);
          document.getElementById('ocrProgressBar').style.width = pct + '%';
          document.getElementById('ocrProgressLabel').textContent = 'Mengenali teks... ' + pct + '%';
        }
      }}).then(function (r) {
        document.getElementById('ocrButton').disabled = false;
        document.getElementById('resultCard').classList.remove('d-none');
        document.getElementById('ocrResult').value = r.data.text.trim();
      }).catch(function () { document.getElementById('ocrButton').disabled = false; eaToast('error','OCR gagal. Coba foto yang lebih jelas.'); });
    }
    function copyResult() { navigator.clipboard.writeText(document.getElementById('ocrResult').value).then(function(){eaToast('success','Teks disalin');}); }
    function downloadTxt() {
      var blob = new Blob([document.getElementById('ocrResult').value],{type:'text/plain'});
      var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'hasil-ocr.txt'; a.click();
    }
    function translateResult() {
      var text = document.getElementById('ocrResult').value.trim();
      if (!text) return;
      var box = document.getElementById('translationBox');
      box.classList.remove('d-none');
      box.textContent = 'Menerjemahkan...';

      // Client-side Google Translate (same approach as translator.html)
      fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=id&dt=t&q=' + encodeURIComponent(text.substring(0, 1000)))
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var translated = data[0].map(function(c){return c[0]||'';}).join('');
          box.textContent = translated || 'Terjemahan kosong.';
        })
        .catch(function() {
          // Fallback to Apps Script server
          EA.api('translateOcrResult', [session.token, text])
            .then(function(r) { box.textContent = r.success ? r.translatedText : 'Gagal menerjemahkan.'; })
            .catch(function() { box.textContent = 'Gagal menerjemahkan.'; });
        });
    }
  </script>
</body>
</html>
