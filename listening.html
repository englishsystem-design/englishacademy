<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Latihan Mendengarkan — English Academy Indonesia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <a href="#ea-main" class="skip-link">Langsung ke konten</a>
  <div id="ea-navbar"></div>
  <main id="ea-main" class="container py-4" style="max-width:700px;">
    <h1 class="h3 mb-1">Latihan Mendengarkan</h1>
    <p class="text-muted mb-4">Putar audio/video dari materi, atur kecepatan, lalu kerjakan kuis pemahamannya.</p>
    <div id="loadingState" class="ea-loading"><div class="spinner-border text-primary" role="status"></div></div>
    <div id="lessonList" class="row g-3"></div>
    <p id="emptyState" class="text-muted d-none">Belum ada materi audio/video yang tersedia.</p>
  </main>
  <div id="ea-footer"></div>
  <script src="config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    var session = eaRequireLogin(['student']);
    if (session) {
      eaIncludeHTML('#ea-navbar', 'partials/navbar.html', function () { eaRenderNav(session); });
      eaIncludeHTML('#ea-footer', 'partials/footer.html');
      EA.api('getMyStudentProfile', [session.token])
        .then(function (p) { loadListeningLessons(p ? p.Kelas : 'X'); })
        .catch(function () { loadListeningLessons('X'); });
    }

    function loadListeningLessons(kelas) {
      EA.api('listModules', [session.token, kelas]).then(function (modules) {
        var pending = modules.length;
        var cards = [];
        if (pending === 0) { showEmpty(); return; }
        modules.forEach(function (m) {
          EA.api('listLessonsByModule', [session.token, m.ModuleID]).then(function (lessons) {
            lessons.filter(function (l) { return !!l.VideoID; }).forEach(function (l) { cards.push({ module: m, lesson: l }); });
            pending--;
            if (pending === 0) renderCards(cards);
          }).catch(function () { pending--; if (pending === 0) renderCards(cards); });
        });
      });
    }

    function showEmpty() {
      document.getElementById('loadingState').classList.add('d-none');
      document.getElementById('emptyState').classList.remove('d-none');
    }

    function renderCards(cards) {
      document.getElementById('loadingState').classList.add('d-none');
      if (cards.length === 0) { document.getElementById('emptyState').classList.remove('d-none'); return; }
      var container = document.getElementById('lessonList');
      container.innerHTML = cards.map(function (c, idx) {
        return '<div class="col-12"><div class="ea-card p-4" id="card_' + idx + '">' +
          '<p class="ea-eyebrow mb-1">' + c.module.ModuleTitle + '</p>' +
          '<h2 class="h5 mb-3">' + c.lesson.LessonTitle + '</h2>' +
          '<div id="player_' + idx + '"><p class="text-muted small">Memuat pemutar...</p></div>' +
          '<div class="d-flex align-items-center gap-2 mt-2">' +
          '<label class="small text-muted mb-0">Kecepatan:</label>' +
          '<select class="form-select form-select-sm" style="width:auto;" onchange="setSpeed(' + idx + ', this.value)">' +
          '<option value="0.75">0.75x</option><option value="1" selected>1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option>' +
          '</select>' +
          '<a href="lessons.html" class="btn btn-sm btn-outline-primary ms-auto">Lihat Modul</a>' +
          '</div></div></div>';
      }).join('');
      cards.forEach(function (c, idx) { loadPlayer(idx, c.lesson.LessonID); });
    }

    function loadPlayer(idx, lessonId) {
      EA.api('getLesson', [session.token, lessonId]).then(function (lesson) {
        var container = document.getElementById('player_' + idx);
        if (!lesson.video) { container.innerHTML = '<p class="text-muted small">Audio/video tidak tersedia.</p>'; return; }
        if (lesson.video.sourceType === 'youtube') {
          var m = lesson.video.url.match(/(?:v=|youtu\.be\/)([^&]+)/);
          container.innerHTML = '<div class="ratio ratio-16x9"><iframe id="media_' + idx + '" src="https://www.youtube.com/embed/' + (m ? m[1] : '') + '" allowfullscreen></iframe></div>';
        } else {
          container.innerHTML = '<audio id="media_' + idx + '" controls class="w-100" src="' + lesson.video.url + '"></audio>';
        }
      });
    }

    function setSpeed(idx, rate) {
      var el = document.getElementById('media_' + idx);
      if (el && el.tagName === 'AUDIO') el.playbackRate = Number(rate);
    }
  </script>
</body>
</html>
