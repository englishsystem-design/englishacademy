<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Masuk — English Academy Indonesia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <a href="#ea-main" class="skip-link">Langsung ke konten</a>
  <main id="ea-main" class="d-flex align-items-center justify-content-center" style="min-height:100vh;">
    <div class="ea-card p-4 p-md-5" style="width:100%; max-width:420px;">
      <div class="text-center mb-4">
        <span class="ea-badge-kelas mb-2 d-inline-flex" style="width:3rem;height:3rem;font-size:1.1rem;">EA</span>
        <h1 class="h4 mt-2 mb-0">Masuk ke akun Anda</h1>
        <p class="text-muted small">English Academy Indonesia</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" class="form-control" id="username" required autocomplete="username">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" required autocomplete="current-password">
        </div>
        <div id="loginError" class="alert alert-danger py-2 small d-none" role="alert"></div>
        <button type="submit" class="btn btn-ea-primary w-100" id="loginSubmitBtn">Masuk</button>
      </form>

      <p class="text-center small text-muted mt-4 mb-0">Belum punya akun? Hubungi admin sekolah Anda.</p>
      <p class="text-center mt-2"><a href="index.html" class="small">&larr; Kembali ke beranda</a></p>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      var errorBox = document.getElementById('loginError');
      var submitBtn = document.getElementById('loginSubmitBtn');

      errorBox.classList.add('d-none');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Memeriksa...';

      EA.api('login', [username, password])
        .then(function (result) {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Masuk';

          if (!result.success) {
            errorBox.textContent = result.message;
            errorBox.classList.remove('d-none');
            return;
          }

          eaSetSession({ token: result.token, role: result.role, fullName: result.fullName, userId: result.userId });
          eaNavigateTo('dashboard-' + result.role);
        })
        .catch(function (err) {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Masuk';
          errorBox.textContent = err.message.indexOf('config.js') !== -1
            ? err.message
            : 'Terjadi kesalahan koneksi ke server. Silakan coba lagi.';
          errorBox.classList.remove('d-none');
          console.error(err);
        });
    });

    // Already logged in? Skip straight to the dashboard.
    (function () {
      var session = eaGetSession();
      if (session && session.token) {
        EA.api('getCurrentUser', [session.token])
          .then(function (user) { if (user) eaNavigateTo('dashboard-' + user.role); })
          .catch(function () { eaClearSession(); }); // stale/expired session, let them log in again
      }
    })();
  </script>
</body>
</html>
