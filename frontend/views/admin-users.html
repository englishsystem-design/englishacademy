<!DOCTYPE html>
<html lang="id">
<head>
  <title>Manajemen Pengguna — English Academy Indonesia</title>
  <?!= include('partials/head'); ?>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
</head>
<body>
  <a href="#ea-main" class="skip-link">Langsung ke konten</a>
  <?!= include('partials/navbar'); ?>

  <main id="ea-main" class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
      <h1 class="h3 mb-0">Manajemen Pengguna</h1>
      <button class="btn btn-ea-primary" onclick="createUserFlow()"><i class="bi bi-person-plus me-1"></i>Tambah Pengguna</button>
    </div>

    <div class="ea-card p-4">
      <table id="usersTable" class="table table-striped w-100">
        <thead><tr><th>Nama</th><th>Username</th><th>Peran</th><th>Status</th><th>Aksi</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <?!= include('partials/footer'); ?>

  <script>
    var session = eaRequireLogin(['admin']);
    var dataTable;

    if (session) {
      eaRenderNav(session);
      loadUsers();
    }

    function loadUsers() {
      google.script.run.withSuccessHandler(function (users) {
        var rows = users.map(function (u) {
          var statusBadge = u.Status === 'active'
            ? '<span class="badge bg-success-subtle text-success">Aktif</span>'
            : '<span class="badge bg-secondary-subtle text-secondary">Nonaktif</span>';
          var toggleLabel = u.Status === 'active' ? 'Nonaktifkan' : 'Aktifkan';
          var actions =
            '<button class="btn btn-sm btn-outline-secondary me-1" onclick="toggleStatus(\'' + u.UserID + '\', \'' + u.Status + '\')">' + toggleLabel + '</button>' +
            '<button class="btn btn-sm btn-outline-secondary me-1" onclick="resetPasswordFlow(\'' + u.UserID + '\')">Reset Password</button>' +
            '<button class="btn btn-sm btn-outline-danger" onclick="deleteUserFlow(\'' + u.UserID + '\')">Hapus</button>';
          return [u.FullName, u.Username, u.Role, statusBadge, actions];
        });

        if (dataTable) dataTable.destroy();
        dataTable = $('#usersTable').DataTable({ data: rows, columns: [{}, {}, {}, {}, {}], pageLength: 10 });
      }).listUsers(session.token, null);
    }

    function createUserFlow() {
      Swal.fire({
        title: 'Pengguna Baru',
        html:
          '<input id="swalFullName" class="form-control mb-2" placeholder="Nama Lengkap">' +
          '<input id="swalUsername" class="form-control mb-2" placeholder="Username">' +
          '<input id="swalEmail" class="form-control mb-2" placeholder="Email (opsional)">' +
          '<input id="swalPassword" type="password" class="form-control mb-2" placeholder="Password (min. 8 karakter)">' +
          '<select id="swalRole" class="form-select">' +
            '<option value="student">Siswa</option><option value="teacher">Guru</option><option value="admin">Admin</option>' +
          '</select>',
        confirmButtonText: 'Buat Akun', showCancelButton: true
      }).then(function (result) {
        if (!result.isConfirmed) return;
        var payload = {
          fullName: document.getElementById('swalFullName').value,
          username: document.getElementById('swalUsername').value,
          email: document.getElementById('swalEmail').value,
          password: document.getElementById('swalPassword').value,
          role: document.getElementById('swalRole').value
        };
        google.script.run.withSuccessHandler(function (res) {
          if (!res.success) { eaToast('error', res.message); return; }
          eaToast('success', 'Akun dibuat');
          if (payload.role === 'student') createStudentProfileFlow(res.user.UserID);
          else if (payload.role === 'teacher') createTeacherProfileFlow(res.user.UserID);
          else loadUsers();
        }).createUserAccount(session.token, payload);
      });
    }

    function createStudentProfileFlow(userId) {
      Swal.fire({
        title: 'Profil Siswa',
        html:
          '<select id="swalKelas" class="form-select mb-2"><option value="X">Kelas X</option><option value="XI">Kelas XI</option><option value="XII">Kelas XII</option></select>' +
          '<input id="swalClassId" class="form-control mb-2" placeholder="Class ID (opsional, contoh: CLS-X1)">' +
          '<input id="swalNisn" class="form-control" placeholder="NISN (opsional)">',
        confirmButtonText: 'Simpan Profil', showCancelButton: true
      }).then(function (result) {
        if (!result.isConfirmed) { loadUsers(); return; }
        google.script.run.withSuccessHandler(function (res) {
          if (res.success) eaToast('success', 'Profil siswa dibuat'); else eaToast('error', res.message);
          loadUsers();
        }).createStudentProfile(session.token, {
          userId: userId, kelas: document.getElementById('swalKelas').value,
          classId: document.getElementById('swalClassId').value, nisn: document.getElementById('swalNisn').value
        });
      });
    }

    function createTeacherProfileFlow(userId) {
      Swal.fire({
        title: 'Profil Guru',
        html: '<input id="swalNip" class="form-control mb-2" placeholder="NIP (opsional)">' +
          '<input id="swalSubject" class="form-control" placeholder="Mata Pelajaran" value="English">',
        confirmButtonText: 'Simpan Profil', showCancelButton: true
      }).then(function (result) {
        if (!result.isConfirmed) { loadUsers(); return; }
        google.script.run.withSuccessHandler(function (res) {
          if (res.success) eaToast('success', 'Profil guru dibuat'); else eaToast('error', res.message);
          loadUsers();
        }).createTeacherProfile(session.token, {
          userId: userId, nip: document.getElementById('swalNip').value, subject: document.getElementById('swalSubject').value
        });
      });
    }

    function toggleStatus(userId, currentStatus) {
      var fn = currentStatus === 'active' ? 'disableUser' : 'enableUser';
      google.script.run.withSuccessHandler(function (res) {
        if (res.success) { eaToast('success', 'Status diperbarui'); loadUsers(); } else eaToast('error', res.message);
      })[fn](session.token, userId);
    }

    function resetPasswordFlow(userId) {
      Swal.fire({ title: 'Reset Password', input: 'password', inputLabel: 'Password baru (min. 8 karakter)', confirmButtonText: 'Simpan', showCancelButton: true })
        .then(function (result) {
          if (!result.isConfirmed || !result.value) return;
          google.script.run.withSuccessHandler(function (res) {
            if (res.success) eaToast('success', 'Password direset'); else eaToast('error', res.message);
          }).resetPassword(session.token, userId, result.value);
        });
    }

    function deleteUserFlow(userId) {
      Swal.fire({ title: 'Hapus akun ini?', text: 'Tindakan ini tidak dapat dibatalkan.', icon: 'warning', showCancelButton: true, confirmButtonText: 'Hapus' })
        .then(function (result) {
          if (!result.isConfirmed) return;
          google.script.run.withSuccessHandler(function (res) {
            if (res.success) { eaToast('success', 'Akun dihapus'); loadUsers(); } else eaToast('error', res.message);
          }).deleteUserAccount(session.token, userId);
        });
    }
  </script>
</body>
</html>
