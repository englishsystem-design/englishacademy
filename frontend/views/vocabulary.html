<!DOCTYPE html>
<html lang="id">
<head>
  <title>Vocabulary Builder — English Academy Indonesia</title>
  <?!= include('partials/head'); ?>
</head>
<body>
  <a href="#ea-main" class="skip-link">Langsung ke konten</a>
  <?!= include('partials/navbar'); ?>

  <main id="ea-main" class="container py-4" style="max-width:760px;">
    <h1 class="h3 mb-1">Vocabulary Builder</h1>
    <p class="text-muted mb-4">Cari kata, lihat arti dan contohnya, lalu simpan ke daftar favoritmu.</p>

    <div class="ea-card p-4 mb-4">
      <div class="input-group">
        <input type="text" id="wordInput" class="form-control" placeholder="Ketik kata Bahasa Inggris..." onkeydown="if(event.key==='Enter') lookupWord();">
        <button class="btn btn-ea-primary" onclick="lookupWord()">Cari</button>
      </div>
    </div>

    <div id="lookupResult" class="ea-card p-4 mb-4 d-none"></div>

    <h2 class="h5 mb-3">Kata Favorit</h2>
    <div id="favoritesList" class="row g-3"></div>
    <p id="favoritesEmpty" class="text-muted small d-none">Belum ada kata favorit. Cari kata di atas dan simpan!</p>
  </main>

  <?!= include('partials/footer'); ?>

  <script>
    var session = eaRequireLogin(['student']);
    var lastLookup = null;

    if (session) {
      eaRenderNav(session);
      loadFavorites();
    }

    function lookupWord() {
      var word = document.getElementById('wordInput').value.trim();
      if (!word) return;

      var box = document.getElementById('lookupResult');
      box.classList.remove('d-none');
      box.innerHTML = '<p class="text-muted">Mencari...</p>';

      // Free Dictionary API — called directly from the browser (no
      // Apps Script quota used), see Architecture §6.
      fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(word))
        .then(function (res) {
          if (!res.ok) throw new Error('not found');
          return res.json();
        })
        .then(function (data) {
          var entry = data[0];
          var meanings = entry.meanings || [];
          var firstMeaning = meanings[0] || {};
          var definition = (firstMeaning.definitions && firstMeaning.definitions[0]) || {};
          var phonetic = entry.phonetic || (entry.phonetics && entry.phonetics[0] && entry.phonetics[0].text) || '';

          var allSynonyms = [], allAntonyms = [];
          meanings.forEach(function (m) {
            allSynonyms = allSynonyms.concat(m.synonyms || []);
            allAntonyms = allAntonyms.concat(m.antonyms || []);
          });

          lastLookup = {
            word: entry.word, meaning: definition.definition || '-', partOfSpeech: firstMeaning.partOfSpeech || '-',
            synonyms: allSynonyms.slice(0, 6), antonyms: allAntonyms.slice(0, 6),
            exampleSentence: definition.example || ''
          };

          box.innerHTML =
            '<div class="d-flex justify-content-between align-items-start">' +
            '<div><h3 class="h5 mb-0">' + entry.word + '</h3>' +
            (phonetic ? '<p class="text-muted small mb-2">' + phonetic + '</p>' : '') + '</div>' +
            '<button class="btn btn-sm btn-ea-secondary" onclick="saveFavorite()"><i class="bi bi-bookmark-plus me-1"></i>Simpan</button>' +
            '</div>' +
            '<p><span class="badge bg-light text-dark">' + lastLookup.partOfSpeech + '</span></p>' +
            '<p>' + lastLookup.meaning + '</p>' +
            (lastLookup.exampleSentence ? '<p class="fst-italic text-muted small">"' + lastLookup.exampleSentence + '"</p>' : '') +
            (lastLookup.synonyms.length ? '<p class="small"><strong>Sinonim:</strong> ' + lastLookup.synonyms.join(', ') + '</p>' : '') +
            (lastLookup.antonyms.length ? '<p class="small"><strong>Antonim:</strong> ' + lastLookup.antonyms.join(', ') + '</p>' : '');
        })
        .catch(function () {
          box.innerHTML = '<p class="text-muted">Kata tidak ditemukan. Periksa ejaan dan coba lagi.</p>';
        });
    }

    function saveFavorite() {
      if (!lastLookup) return;
      google.script.run
        .withSuccessHandler(function (res) {
          if (res.success) { eaToast('success', 'Kata disimpan'); loadFavorites(); }
          else { eaToast('error', res.message); }
        })
        .saveFavoriteWord(session.token, lastLookup);
    }

    function loadFavorites() {
      google.script.run.withSuccessHandler(function (favorites) {
        var container = document.getElementById('favoritesList');
        if (favorites.length === 0) {
          document.getElementById('favoritesEmpty').classList.remove('d-none');
          container.innerHTML = '';
          return;
        }
        container.innerHTML = favorites.map(function (f) {
          return '<div class="col-md-6"><div class="ea-card p-3 h-100">' +
            '<div class="d-flex justify-content-between align-items-start">' +
            '<h3 class="h6 mb-1">' + f.Word + '</h3>' +
            '<button class="btn btn-sm btn-link text-danger p-0" onclick="removeFavorite(\'' + f.FavoriteID + '\')"><i class="bi bi-trash"></i></button>' +
            '</div>' +
            '<p class="small text-muted mb-1">' + f.PartOfSpeech + '</p>' +
            '<p class="small">' + f.Meaning + '</p>' +
            '</div></div>';
        }).join('');
      }).listFavoriteWords(session.token);
    }

    function removeFavorite(favoriteId) {
      google.script.run.withSuccessHandler(function () { loadFavorites(); }).removeFavoriteWord(session.token, favoriteId);
    }
  </script>
</body>
</html>
