<!DOCTYPE html>
<html lang="id">
<head>
  <title>Ujian — English Academy Indonesia</title>
  <?!= include('partials/head'); ?>
</head>
<body>
  <a href="#ea-main" class="skip-link">Langsung ke konten</a>
  <?!= include('partials/navbar'); ?>

  <main id="ea-main" class="container py-4" style="max-width:760px;">
    <div id="loadingState" class="ea-loading"><div class="spinner-border text-primary" role="status"></div></div>
    <div id="errorState" class="ea-card p-4 text-center d-none">
      <p class="mb-0" id="errorMessage"></p>
      <button class="btn btn-outline-primary mt-3" onclick="eaNavigateTo('lessons')">Kembali</button>
    </div>

    <div id="examState" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-3 sticky-top bg-white py-2" style="top:64px;z-index:10;">
        <h1 class="h4 mb-0" id="examTitle"></h1>
        <span class="badge bg-danger fs-6" id="examTimer">--:--</span>
      </div>
      <div class="alert alert-warning small" id="antiCheatNotice">
        <i class="bi bi-shield-exclamation me-1"></i>Jangan berpindah tab selama ujian berlangsung — sistem mencatat aktivitas ini.
      </div>
      <p class="text-muted" id="examInstructions"></p>

      <div id="questionsContainer"></div>

      <button class="btn btn-ea-primary px-4" onclick="submitExam(false)">Kumpulkan Ujian</button>
    </div>

    <div id="resultState" class="d-none text-center">
      <div class="ea-card p-5">
        <h1 class="display-5" id="resultPercentage"></h1>
        <p class="text-muted" id="resultNote"></p>
        <button class="btn btn-ea-primary mt-3" onclick="eaNavigateTo('lessons')">Kembali ke Materi</button>
      </div>
    </div>
  </main>

  <?!= include('partials/footer'); ?>

  <script>
    var session = eaRequireLogin(['student']);
    var examId, currentAttemptId, deadlineAt, timerInterval, autoSaveInterval, submitted = false;

    if (session) {
      eaRenderNav(session);
      eaGetUrlParams(function (params) {
        examId = params.examId;
        if (!examId) {
          document.getElementById('loadingState').classList.add('d-none');
          document.getElementById('errorState').classList.remove('d-none');
          document.getElementById('errorMessage').textContent = 'ID ujian tidak ditemukan di tautan ini.';
          return;
        }
        google.script.run
          .withSuccessHandler(function (data) {
            document.getElementById('loadingState').classList.add('d-none');
            document.getElementById('examState').classList.remove('d-none');
            renderExam(data);
          })
          .withFailureHandler(function (err) {
            document.getElementById('loadingState').classList.add('d-none');
            document.getElementById('errorState').classList.remove('d-none');
            document.getElementById('errorMessage').textContent = (err && err.message) || 'Ujian tidak tersedia.';
          })
          .startExamAttempt(session.token, examId);
      });
    }

    function renderExam(data) {
      currentAttemptId = data.attemptId;
      deadlineAt = new Date(data.deadlineAt).getTime();
      document.getElementById('examTitle').textContent = data.exam.Title;
      document.getElementById('examInstructions').textContent = data.exam.Instructions || '';
      document.getElementById('antiCheatNotice').classList.toggle('d-none', !data.antiCheatWarning);

      document.getElementById('questionsContainer').innerHTML = data.questions.map(function (q, idx) {
        return renderQuestion(q, idx);
      }).join('');

      startTimer();
      autoSaveInterval = setInterval(autoSave, 30000);

      if (data.antiCheatWarning) {
        document.addEventListener('visibilitychange', function () {
          if (document.hidden && !submitted) {
            google.script.run.logExamCheatWarning(session.token, examId, currentAttemptId, 'tab_hidden');
          }
        });
      }

      window.addEventListener('beforeunload', function (e) {
        if (!submitted) { e.preventDefault(); e.returnValue = ''; }
      });
    }

    function renderQuestion(q, idx) {
      var header = '<div class="ea-card p-4 mb-3"><p class="fw-semibold mb-3">' + (idx + 1) + '. ' + q.QuestionText + '</p>';
      var body = '';
      if (q.QuestionType === 'mc' || q.QuestionType === 'tf') {
        var options = q.QuestionType === 'tf' ? ['True', 'False'] : (q.Options.choices || []);
        body = options.map(function (opt) {
          return '<div class="form-check"><input class="form-check-input" type="radio" name="q_' + q.QuestionID + '" value="' + opt + '" id="' + q.QuestionID + '_' + opt + '">' +
            '<label class="form-check-label" for="' + q.QuestionID + '_' + opt + '">' + opt + '</label></div>';
        }).join('');
      } else if (q.QuestionType === 'mr') {
        body = (q.Options.choices || []).map(function (opt) {
          return '<div class="form-check"><input class="form-check-input" type="checkbox" name="q_' + q.QuestionID + '" value="' + opt + '" id="' + q.QuestionID + '_' + opt + '">' +
            '<label class="form-check-label" for="' + q.QuestionID + '_' + opt + '">' + opt + '</label></div>';
        }).join('');
      } else if (q.QuestionType === 'fillblank') {
        body = '<input type="text" class="form-control" name="q_' + q.QuestionID + '" placeholder="Jawabanmu...">';
      } else if (q.QuestionType === 'essay') {
        body = '<textarea class="form-control" name="q_' + q.QuestionID + '" rows="5" placeholder="Tulis jawabanmu..."></textarea>';
      }
      return header + body + '</div>';
    }

    function startTimer() {
      timerInterval = setInterval(function () {
        var remainingMs = deadlineAt - Date.now();
        if (remainingMs <= 0) {
          clearInterval(timerInterval);
          document.getElementById('examTimer').textContent = '00:00';
          eaToast('warning', 'Waktu habis — ujian dikumpulkan otomatis.');
          submitExam(true);
          return;
        }
        var totalSec = Math.floor(remainingMs / 1000);
        var mm = String(Math.floor(totalSec / 60)).padStart(2, '0');
        var ss = String(totalSec % 60).padStart(2, '0');
        document.getElementById('examTimer').textContent = mm + ':' + ss;
      }, 1000);
    }

    function collectAnswers() {
      var answers = [];
      var seen = {};
      document.querySelectorAll('[name^="q_"]').forEach(function (el) {
        var questionId = el.name.replace('q_', '');
        if (seen[questionId]) return;
        seen[questionId] = true;

        var studentAnswer;
        if (el.type === 'radio') {
          var checked = document.querySelector('[name="' + el.name + '"]:checked');
          studentAnswer = { selected: checked ? checked.value : null };
        } else if (el.type === 'checkbox') {
          var checkedAll = document.querySelectorAll('[name="' + el.name + '"]:checked');
          studentAnswer = { selected: Array.from(checkedAll).map(function (c) { return c.value; }) };
        } else if (el.tagName === 'TEXTAREA') {
          studentAnswer = { text: el.value };
        } else {
          studentAnswer = { text: el.value };
        }
        answers.push({ questionId: questionId, studentAnswer: studentAnswer });
      });
      return answers;
    }

    function autoSave() {
      if (submitted) return;
      google.script.run.autoSaveExamProgress(session.token, currentAttemptId, collectAnswers());
    }

    function submitExam(isAutoSubmit) {
      if (submitted) return;
      submitted = true;
      clearInterval(timerInterval);
      clearInterval(autoSaveInterval);

      google.script.run
        .withSuccessHandler(function (res) {
          if (!res.success) { eaToast('error', res.message); submitted = false; return; }
          document.getElementById('examState').classList.add('d-none');
          document.getElementById('resultState').classList.remove('d-none');
          document.getElementById('resultPercentage').textContent = res.score.Percentage + '%';
          document.getElementById('resultNote').textContent = res.score.GradingStatus === 'pending_manual'
            ? 'Sebagian soal esai menunggu penilaian guru.' : 'Ujian telah dinilai otomatis.';
        })
        .withFailureHandler(function (err) {
          eaToast('error', 'Gagal mengumpulkan ujian. Jawabanmu tersimpan otomatis — hubungi guru jika masalah berlanjut.');
          console.error(err);
        })
        .submitExamAttempt(session.token, examId, currentAttemptId, collectAnswers(), !!isAutoSubmit);
    }
  </script>
</body>
</html>
