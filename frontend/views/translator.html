<!DOCTYPE html>
<html lang="id">
<head>
  <title>Translator — English Academy Indonesia</title>
  <?!= include('partials/head'); ?>
</head>
<body>
  <a href="#ea-main" class="skip-link">Langsung ke konten</a>
  <?!= include('partials/navbar'); ?>

  <main id="ea-main" class="container py-4" style="max-width:760px;">
    <h1 class="h3 mb-1">Translator</h1>
    <p class="text-muted mb-4">Terjemahkan kata atau kalimat antara Bahasa Inggris dan Bahasa Indonesia.</p>

    <div class="ea-card p-4">
      <div class="d-flex justify-content-center mb-3">
        <div class="btn-group" role="group">
          <button class="btn btn-outline-primary active" id="dirEnId" onclick="setDirection('en-id')">English → Indonesia</button>
          <button class="btn btn-outline-primary" id="dirIdEn" onclick="setDirection('id-en')">Indonesia → English</button>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-md-6">
          <textarea id="sourceText" class="form-control" rows="8" placeholder="Ketik teks di sini..."></textarea>
        </div>
        <div class="col-md-6">
          <textarea id="targetText" class="form-control" rows="8" readonly placeholder="Hasil terjemahan..."></textarea>
        </div>
      </div>

      <div class="text-center mt-3">
        <button class="btn btn-ea-primary px-4" onclick="doTranslate()" id="translateBtn">Terjemahkan</button>
      </div>
      <p class="small text-muted text-center mt-2 mb-0" id="sourceInfo"></p>
    </div>
  </main>

  <?!= include('partials/footer'); ?>

  <script>
    var session = eaRequireLogin(['admin', 'teacher', 'student']);
    if (session) eaRenderNav(session);

    var direction = 'en-id';

    function setDirection(d) {
      direction = d;
      document.getElementById('dirEnId').classList.toggle('active', d === 'en-id');
      document.getElementById('dirIdEn').classList.toggle('active', d === 'id-en');
    }

    function doTranslate() {
      var text = document.getElementById('sourceText').value.trim();
      if (!text) { eaToast('error', 'Masukkan teks terlebih dahulu.'); return; }

      var btn = document.getElementById('translateBtn');
      btn.disabled = true;
      btn.textContent = 'Menerjemahkan...';

      google.script.run
        .withSuccessHandler(function (res) {
          btn.disabled = false;
          btn.textContent = 'Terjemahkan';
          if (res.success) {
            document.getElementById('targetText').value = res.translatedText;
            document.getElementById('sourceInfo').textContent =
              res.source === 'cache' ? 'Hasil dari cache (lebih cepat)' : 'Diterjemahkan via ' + res.source;
          } else {
            eaToast('error', res.message);
          }
        })
        .withFailureHandler(function (err) {
          btn.disabled = false;
          btn.textContent = 'Terjemahkan';
          eaToast('error', 'Gagal menerjemahkan. Coba lagi.');
          console.error(err);
        })
        .translateText(session.token, text, direction);
    }
  </script>
</body>
</html>
