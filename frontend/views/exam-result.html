<!DOCTYPE html>
<html lang="id">
<head>
  <title>Laporan Ujian — English Academy Indonesia</title>
  <?!= include('partials/head'); ?>
</head>
<body>
  <a href="#ea-main" class="skip-link">Langsung ke konten</a>
  <?!= include('partials/navbar'); ?>

  <main id="ea-main" class="container py-4">
    <h1 class="h3 mb-1">Laporan Ujian</h1>
    <div id="loadingState" class="ea-loading"><div class="spinner-border text-primary" role="status"></div></div>

    <div id="reportCard" class="d-none">
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-4">
          <div class="ea-card ea-stat-card"><div class="ea-stat-value" id="totalAttempts">-</div><div class="ea-stat-label">Total Peserta</div></div>
        </div>
        <div class="col-6 col-md-4">
          <div class="ea-card ea-stat-card"><div class="ea-stat-value" id="averageScore">-</div><div class="ea-stat-label">Rata-rata Nilai</div></div>
        </div>
      </div>

      <div class="ea-card p-4">
        <div class="table-responsive">
          <table class="table align-middle">
            <thead><tr><th>Siswa</th><th class="text-end">Nilai</th><th>Status</th><th class="text-end">Waktu</th><th class="text-end">Peringatan</th></tr></thead>
            <tbody id="reportBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <?!= include('partials/footer'); ?>

  <script>
    var session = eaRequireLogin(['admin', 'teacher']);

    if (session) {
      eaRenderNav(session);
      eaGetUrlParams(function (params) {
        var examId = params.examId;
        if (!examId) {
          document.getElementById('loadingState').classList.add('d-none');
          eaToast('error', 'ID ujian tidak ditemukan.');
          return;
        }
        google.script.run
          .withSuccessHandler(function (report) {
            document.getElementById('loadingState').classList.add('d-none');
            document.getElementById('reportCard').classList.remove('d-none');
            document.getElementById('totalAttempts').textContent = report.totalAttempts;
            document.getElementById('averageScore').textContent = report.averagePercentage + '%';

            document.getElementById('reportBody').innerHTML = report.students.map(function (s) {
              var statusBadge = s.gradingStatus === 'pending_manual'
                ? '<span class="badge bg-warning-subtle text-warning">Menunggu Penilaian</span>'
                : '<span class="badge bg-success-subtle text-success">Selesai</span>';
              var warnBadge = s.cheatWarningCount > 0
                ? '<span class="badge bg-danger-subtle text-danger">' + s.cheatWarningCount + 'x</span>' : '-';
              return '<tr><td>' + s.fullName + '</td><td class="text-end fw-semibold">' + s.percentage + '%</td>' +
                '<td>' + statusBadge + '</td><td class="text-end small text-muted">' + s.timeTakenSeconds + 's</td>' +
                '<td class="text-end">' + warnBadge + '</td></tr>';
            }).join('');
          })
          .withFailureHandler(function (err) {
            document.getElementById('loadingState').classList.add('d-none');
            eaToast('error', 'Gagal memuat laporan.');
            console.error(err);
          })
          .getExamReport(session.token, examId);
      });
    }
  </script>
</body>
</html>
