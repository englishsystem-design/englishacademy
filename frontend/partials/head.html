<!--
  partials/head.html
  English Academy Indonesia

  Brand tokens (Phase 5 §3): Primary #00AEEF, Secondary #4CAF50,
  Accent #FFC107, Typography Poppins. Consolidated here as one <style>
  block rather than a separate assets/css/custom.html include — simpler
  for an Apps Script project with no real build step, same result.

  This file is rendered via createTemplateFromFile(...).evaluate(), so
  it can reference server-side globals directly, e.g. CONFIG below.
-->
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

<style>
  :root {
    --ea-primary: #00AEEF;
    --ea-primary-dark: #0090C7;
    --ea-secondary: #4CAF50;
    --ea-accent: #FFC107;
    --ea-ink: #1B2733;
    --ea-ink-soft: #5B6B7A;
    --ea-bg: #F6FAFC;
    --ea-card-radius: 16px;
  }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--ea-bg);
    color: var(--ea-ink);
  }

  h1, h2, h3, h4, h5, .ea-display { font-weight: 700; }
  .ea-eyebrow {
    font-size: .75rem; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; color: var(--ea-primary-dark);
  }

  .btn-ea-primary {
    background: var(--ea-primary); border-color: var(--ea-primary); color: #fff;
    font-weight: 600; border-radius: 10px;
  }
  .btn-ea-primary:hover { background: var(--ea-primary-dark); border-color: var(--ea-primary-dark); color: #fff; }
  .btn-ea-secondary { background: var(--ea-secondary); border-color: var(--ea-secondary); color: #fff; font-weight: 600; border-radius: 10px; }
  .btn-ea-accent { background: var(--ea-accent); border-color: var(--ea-accent); color: var(--ea-ink); font-weight: 600; border-radius: 10px; }

  .ea-card {
    background: #fff; border: 1px solid #E7EEF2; border-radius: var(--ea-card-radius);
    box-shadow: 0 2px 10px rgba(27,39,51,.04);
  }
  .ea-stat-card { padding: 1.25rem 1.5rem; }
  .ea-stat-value { font-size: 2rem; font-weight: 800; color: var(--ea-ink); line-height: 1; }
  .ea-stat-label { font-size: .85rem; color: var(--ea-ink-soft); margin-top: .25rem; }

  .ea-badge-kelas {
    display: inline-flex; align-items: center; justify-content: center;
    width: 2.25rem; height: 2.25rem; border-radius: 999px;
    background: linear-gradient(135deg, var(--ea-primary), var(--ea-secondary));
    color: #fff; font-weight: 700; font-size: .85rem;
  }

  .ea-navbar { background: #fff; border-bottom: 1px solid #E7EEF2; }
  .ea-navbar .navbar-brand { font-weight: 800; color: var(--ea-ink); }
  .ea-navbar .navbar-brand span { color: var(--ea-primary); }
  .ea-navbar .nav-link { color: var(--ea-ink-soft); font-weight: 500; }
  .ea-navbar .nav-link.active { color: var(--ea-primary); font-weight: 600; }

  .ea-progress { height: .6rem; border-radius: 999px; background: #E7EEF2; }
  .ea-progress > div { background: linear-gradient(90deg, var(--ea-primary), var(--ea-secondary)); border-radius: 999px; }

  .ea-loading { display: flex; align-items: center; justify-content: center; min-height: 40vh; color: var(--ea-ink-soft); }
  .skip-link {
    position: absolute; left: -999px; top: 0; background: var(--ea-primary); color: #fff;
    padding: .5rem 1rem; z-index: 2000; border-radius: 0 0 8px 0;
  }
  .skip-link:focus { left: 0; }

  a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
    outline: 3px solid var(--ea-accent); outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>

<script>
  // Available globally to every page's inline script — see Architecture
  // §11/Code.gs for why navigation needs a known base URL in an Apps
  // Script web app (there's no reliable client-side way to discover it).
  var APP_BASE_URL = '<?= CONFIG.WEB_APP_URL ?>';

  function eaNavigateTo(page, extraQuery) {
    var url = APP_BASE_URL + '?page=' + encodeURIComponent(page) + (extraQuery ? '&' + extraQuery : '');
    window.top.location.href = url;
  }

  /**
   * Reads the current page's query parameters (?lessonId=..., ?quizId=...)
   * SAFELY from inside the Apps Script iframe sandbox.
   *
   * CRITICAL: do NOT read window.top.location.search directly. Apps Script
   * Web Apps render inside a cross-origin iframe; browsers allow WRITING
   * window.top.location (navigation) cross-origin but throw a SecurityError
   * on READING it. google.script.url.getLocation() is the official API
   * built specifically to work around this. Callback-based because it's
   * inherently async — every page that needs a query param must run its
   * param-dependent logic inside this callback, not synchronously after it.
   */
  function eaGetUrlParams(callback) {
    try {
      google.script.url.getLocation(function (location) {
        callback((location && location.parameter) || {});
      });
    } catch (e) {
      // Defensive fallback only (e.g. if ever loaded outside the Apps
      // Script sandbox) — not expected to be hit in normal deployment.
      try {
        var params = {};
        new URLSearchParams(window.location.search).forEach(function (v, k) { params[k] = v; });
        callback(params);
      } catch (e2) {
        callback({});
      }
    }
  }

  function eaGetSession() {
    var raw = sessionStorage.getItem('ea_session');
    return raw ? JSON.parse(raw) : null;
  }

  function eaRequireLogin(allowedRoles) {
    var session = eaGetSession();
    if (!session || !session.token) {
      eaNavigateTo('login');
      return null;
    }
    if (allowedRoles && allowedRoles.indexOf(session.role) === -1) {
      eaNavigateTo('dashboard-' + session.role);
      return null;
    }
    return session;
  }

  function eaToast(icon, title) {
    Swal.fire({ icon: icon, title: title, toast: true, position: 'top-end', timer: 2500, showConfirmButton: false });
  }

  function eaLogout() {
    var session = eaGetSession();
    google.script.run.logout(session ? session.token : null);
    sessionStorage.removeItem('ea_session');
    eaNavigateTo('login');
  }
</script>
