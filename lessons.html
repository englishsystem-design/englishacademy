<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Materi Pelajaran — English Academy Indonesia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <a href="#ea-main" class="skip-link">Langsung ke konten</a>
  <div id="ea-navbar"></div>
  <main id="ea-main" class="container py-4">
    <div id="loadingState" class="ea-loading"><div class="spinner-border text-primary" role="status"></div></div>
    <div id="contentState" class="d-none">
      <h1 class="h3 mb-1">Materi Pelajaran</h1>
      <p class="text-muted mb-4">Kurikulum Merdeka — 43 modul, Kelas X sampai XII.</p>
      <ul class="nav nav-pills mb-4" id="tingkatTabs"></ul>
      <div id="modulesList" class="row g-3"></div>
    </div>
  </main>
  <div id="ea-footer"></div>
  <script src="config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    var session = eaRequireLogin(['admin', 'teacher', 'student']);
    var isManager = session && (session.role === 'admin' || session.role === 'teacher');
    var activeTingkat = 'X';

    if (session) {
      eaIncludeHTML('#ea-navbar', 'partials/navbar.html', function () { eaRenderNav(session); });
      eaIncludeHTML('#ea-footer', 'partials/footer.html');
      renderTabs();

      if (session.role === 'student') {
        EA.api('getMyStudentProfile', [session.token])
          .then(function (p) { if (p) activeTingkat = p.Kelas; loadModules(); })
          .catch(function () { loadModules(); });
      } else {
        loadModules();
      }
    }

    function renderTabs() {
      document.getElementById('tingkatTabs').innerHTML = ['X','XI','XII'].map(function (t) {
        return '<li class="nav-item"><a class="nav-link" id="tab-' + t + '" href="#" onclick="switchTingkat(\'' + t + '\'); return false;">Kelas ' + t + '</a></li>';
      }).join('');
    }

    function switchTingkat(t) { activeTingkat = t; loadModules(); }

    function loadModules() {
      document.querySelectorAll('#tingkatTabs .nav-link').forEach(function (el) { el.classList.remove('active'); });
      var tab = document.getElementById('tab-' + activeTingkat);
      if (tab) tab.classList.add('active');

      EA.api('listModules', [session.token, activeTingkat])
        .then(function (modules) {
          document.getElementById('loadingState').classList.add('d-none');
          document.getElementById('contentState').classList.remove('d-none');
          var container = document.getElementById('modulesList');
          if (modules.length === 0) { container.innerHTML = '<p class="text-muted">Belum ada modul.</p>'; return; }
          container.innerHTML = modules.map(function (m) {
            var statusBadge = isManager ? (m.Status === 'published'
              ? '<span class="badge bg-success-subtle text-success">Terbit</span>'
              : '<span class="badge bg-warning-subtle text-warning">Draft</span>') : '';
            return '<div class="col-md-6 col-lg-4"><div class="ea-card p-3 h-100 d-flex flex-column">' +
              '<div class="d-flex justify-content-between align-items-start mb-2"><span class="ea-eyebrow">Modul ' + m.ModuleNumber + '</span>' + statusBadge + '</div>' +
              '<h5 class="mb-2">' + m.ModuleTitle + '</h5>' +
              '<p class="text-muted small flex-grow-1">' + (m.LearningObjectives || 'Belum ada deskripsi tujuan pembelajaran.') + '</p>' +
              '<div class="d-flex gap-2 mt-2">' +
              '<button class="btn btn-sm btn-outline-primary flex-grow-1" onclick="openModule(\'' + m.ModuleID + '\', \'' + m.ModuleTitle.replace(/'/g,"\\'") + '\')">Lihat Materi</button>' +
              (isManager ? '<button class="btn btn-sm btn-outline-secondary" onclick="editModule(\'' + m.ModuleID + '\', \'' + m.ModuleTitle.replace(/'/g,"\\'") + '\')"><i class="bi bi-pencil"></i></button>' : '') +
              '</div></div></div>';
          }).join('');
        })
        .catch(function (err) {
          document.getElementById('loadingState').classList.add('d-none');
          eaToast('error', 'Gagal memuat modul.');
          console.error(err);
        });
    }

    function openModule(moduleId, moduleTitle) {
      EA.api('listLessonsByModule', [session.token, moduleId]).then(function (lessons) {
        var html = lessons.length === 0
          ? '<p class="text-muted">Belum ada materi di modul ini.</p>'
          : '<div class="list-group text-start">' + lessons.map(function (l) {
              return '<a href="lesson-detail.html?lessonId=' + l.LessonID + '" class="list-group-item list-group-item-action">' + l.LessonTitle + '</a>';
            }).join('') + '</div>';
        Swal.fire({
          title: moduleTitle, html: html,
          showCancelButton: isManager, cancelButtonText: '+ Tambah Materi',
          confirmButtonText: 'Tutup', reverseButtons: true
        }).then(function (res) {
          if (res.dismiss === Swal.DismissReason.cancel) createLessonFlow(moduleId);
        });
      });
    }

    function createLessonFlow(moduleId) {
      Swal.fire({ title: 'Materi Baru', input: 'text', inputLabel: 'Judul materi', showCancelButton: true, confirmButtonText: 'Buat' })
        .then(function (res) {
          if (!res.isConfirmed || !res.value) return;
          EA.api('createLesson', [session.token, { moduleId: moduleId, lessonTitle: res.value }])
            .then(function (r) {
              if (r.success) window.location.href = 'lesson-detail.html?lessonId=' + r.lesson.LessonID;
              else eaToast('error', r.message);
            });
        });
    }

    function editModule(moduleId, moduleTitle) {
      EA.api('getModule', [session.token, moduleId]).then(function (mod) {
        Swal.fire({
          title: 'Edit: ' + moduleTitle,
          html: '<textarea id="sO" class="form-control mb-2" placeholder="Tujuan Pembelajaran">' + (mod.LearningObjectives||'') + '</textarea>' +
            '<textarea id="sOU" class="form-control mb-2" placeholder="Capaian Pembelajaran">' + (mod.LearningOutcomes||'') + '</textarea>' +
            '<select id="sSt" class="form-select"><option value="draft"' + (mod.Status==='draft'?' selected':'') + '>Draft</option><option value="published"' + (mod.Status==='published'?' selected':'') + '>Terbit</option></select>',
          confirmButtonText: 'Simpan', showCancelButton: true
        }).then(function (res) {
          if (!res.isConfirmed) return;
          EA.api('updateModule', [session.token, moduleId, {
            LearningObjectives: document.getElementById('sO').value,
            LearningOutcomes: document.getElementById('sOU').value,
            Status: document.getElementById('sSt').value
          }]).then(function () { eaToast('success', 'Modul diperbarui'); loadModules(); });
        });
      });
    }
  </script>
</body>
</html>
