<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Translator — English Academy Indonesia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <a href="#ea-main" class="skip-link">Langsung ke konten</a>
  <div id="ea-navbar"></div>
  <main id="ea-main" class="container py-4" style="max-width:760px;">
    <h1 class="h3 mb-1">Translator</h1>
    <p class="text-muted mb-4">Terjemahkan kata atau kalimat antara Bahasa Inggris dan Bahasa Indonesia.</p>
    <div class="ea-card p-4">
      <div class="d-flex justify-content-center mb-3">
        <div class="btn-group">
          <button class="btn btn-outline-primary active" id="dirEnId" onclick="setDir('en-id')">English → Indonesia</button>
          <button class="btn btn-outline-primary" id="dirIdEn" onclick="setDir('id-en')">Indonesia → English</button>
        </div>
      </div>
      <div class="row g-3">
        <div class="col-md-6"><textarea id="sourceText" class="form-control" rows="8" placeholder="Ketik teks di sini..."></textarea></div>
        <div class="col-md-6"><textarea id="targetText" class="form-control" rows="8" readonly placeholder="Hasil terjemahan..."></textarea></div>
      </div>
      <div class="text-center mt-3">
        <button class="btn btn-ea-primary px-4" onclick="doTranslate()" id="translateBtn">Terjemahkan</button>
      </div>
      <p class="small text-muted text-center mt-2 mb-0" id="sourceInfo"></p>
    </div>
  </main>
  <div id="ea-footer"></div>
  <script src="config.js"></script><script src="assets/js/api.js"></script><script src="assets/js/app.js"></script>
  <script>
    var session = eaRequireLogin(['admin','teacher','student']);
    var direction = 'en-id';
    if (session) {
      eaIncludeHTML('#ea-navbar','partials/navbar.html',function(){eaRenderNav(session);});
      eaIncludeHTML('#ea-footer','partials/footer.html');
    }
    function setDir(d) {
      direction = d;
      document.getElementById('dirEnId').classList.toggle('active', d==='en-id');
      document.getElementById('dirIdEn').classList.toggle('active', d==='id-en');
    }
    function doTranslate() {
      var text = document.getElementById('sourceText').value.trim();
      if (!text) { eaToast('error','Masukkan teks terlebih dahulu.'); return; }
      var btn = document.getElementById('translateBtn');
      btn.disabled = true; btn.textContent = 'Menerjemahkan...';
      EA.api('translateText',[session.token, text, direction])
        .then(function(r){
          btn.disabled=false; btn.textContent='Terjemahkan';
          if(r.success){
            document.getElementById('targetText').value=r.translatedText;
            document.getElementById('sourceInfo').textContent=r.source==='cache'?'Hasil dari cache (lebih cepat)':'Diterjemahkan via '+r.source;
          } else { eaToast('error', r.message); }
        })
        .catch(function(err){btn.disabled=false;btn.textContent='Terjemahkan';eaToast('error','Gagal menerjemahkan. Coba lagi.');console.error(err);});
    }
  </script>
</body>
</html>
