<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Laporan Ujian — English Academy Indonesia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div id="ea-navbar"></div>
  <main class="container py-4">
    <h1 class="h3 mb-1">Laporan Ujian</h1>
    <div id="loadingState" class="ea-loading"><div class="spinner-border text-primary" role="status"></div></div>
    <div id="reportCard" class="d-none">
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-4"><div class="ea-card ea-stat-card"><div class="ea-stat-value" id="totalAttempts">-</div><div class="ea-stat-label">Total Peserta</div></div></div>
        <div class="col-6 col-md-4"><div class="ea-card ea-stat-card"><div class="ea-stat-value" id="averageScore">-</div><div class="ea-stat-label">Rata-rata Nilai</div></div></div>
      </div>
      <div class="ea-card p-4">
        <div class="table-responsive">
          <table class="table align-middle">
            <thead><tr><th>Siswa</th><th class="text-end">Nilai</th><th>Status</th><th class="text-end">Waktu</th><th class="text-end">Peringatan</th></tr></thead>
            <tbody id="reportBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
  <div id="ea-footer"></div>
  <script src="config.js"></script><script src="assets/js/api.js"></script><script src="assets/js/app.js"></script>
  <script>
    var session = eaRequireLogin(['admin','teacher']);
    var examId = eaGetUrlParams().examId;
    if (session && examId) {
      eaIncludeHTML('#ea-navbar','partials/navbar.html',function(){eaRenderNav(session);});
      eaIncludeHTML('#ea-footer','partials/footer.html');
      EA.api('getExamReport',[session.token,examId]).then(function(report){
        document.getElementById('loadingState').classList.add('d-none');
        document.getElementById('reportCard').classList.remove('d-none');
        document.getElementById('totalAttempts').textContent=report.totalAttempts;
        document.getElementById('averageScore').textContent=report.averagePercentage+'%';
        document.getElementById('reportBody').innerHTML=report.students.map(function(s){
          var sb=s.gradingStatus==='pending_manual'?'<span class="badge bg-warning-subtle text-warning">Menunggu</span>':'<span class="badge bg-success-subtle text-success">Selesai</span>';
          var wb=s.cheatWarningCount>0?'<span class="badge bg-danger-subtle text-danger">'+s.cheatWarningCount+'x</span>':'-';
          return '<tr><td>'+s.fullName+'</td><td class="text-end fw-semibold">'+s.percentage+'%</td><td>'+sb+'</td><td class="text-end small text-muted">'+s.timeTakenSeconds+'s</td><td class="text-end">'+wb+'</td></tr>';
        }).join('');
      }).catch(function(){document.getElementById('loadingState').classList.add('d-none');eaToast('error','Gagal memuat laporan.');});
    }
  </script>
</body></html>
