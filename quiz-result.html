<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Papan Peringkat — English Academy Indonesia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div id="ea-navbar"></div>
  <main class="container py-4">
    <h1 class="h3 mb-4">Papan Peringkat</h1>
    <div id="loadingState" class="ea-loading"><div class="spinner-border text-primary" role="status"></div></div>
    <div class="ea-card p-4 d-none" id="resultCard">
      <table class="table"><thead><tr><th>#</th><th>Nama</th><th class="text-end">Nilai</th><th class="text-end">Waktu</th></tr></thead>
      <tbody id="leaderboardBody"></tbody></table>
      <p id="leaderboardEmpty" class="text-muted small text-center d-none">Belum ada yang mengerjakan kuis ini.</p>
    </div>
  </main>
  <div id="ea-footer"></div>
  <script src="config.js"></script><script src="assets/js/api.js"></script><script src="assets/js/app.js"></script>
  <script>
    var session = eaRequireLogin(['admin','teacher','student']);
    var quizId = eaGetUrlParams().quizId;
    if (session && quizId) {
      eaIncludeHTML('#ea-navbar','partials/navbar.html',function(){eaRenderNav(session);});
      eaIncludeHTML('#ea-footer','partials/footer.html');
      EA.api('getQuizLeaderboard',[session.token,quizId,20]).then(function(ranked){
        document.getElementById('loadingState').classList.add('d-none');
        document.getElementById('resultCard').classList.remove('d-none');
        if(ranked.length===0){document.getElementById('leaderboardEmpty').classList.remove('d-none');return;}
        document.getElementById('leaderboardBody').innerHTML=ranked.map(function(r,i){
          var m=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
          return '<tr><td>'+m+'</td><td>'+r.fullName+'</td><td class="text-end fw-semibold">'+r.percentage+'%</td><td class="text-end text-muted small">'+r.timeTakenSeconds+'s</td></tr>';
        }).join('');
      }).catch(function(){document.getElementById('loadingState').classList.add('d-none');eaToast('error','Gagal memuat papan peringkat.');});
    }
  </script>
</body></html>
