<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kehadiran — English Academy Indonesia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <a href="#ea-main" class="skip-link">Langsung ke konten</a>
  <div id="ea-navbar"></div>
  <main id="ea-main" class="container py-4">
    <h1 class="h3 mb-1">Kehadiran</h1>
    <p class="text-muted mb-4">Tandai kehadiran siswa per kelas, atau terbitkan sertifikat penyelesaian modul.</p>
    <div class="ea-card p-4 mb-4">
      <div class="row g-2 align-items-end">
        <div class="col-md-4">
          <label class="form-label small">Kelas</label>
          <select id="classSelect" class="form-select"></select>
        </div>
        <div class="col-md-3">
          <label class="form-label small">Tanggal</label>
          <input type="date" id="attendanceDate" class="form-control">
        </div>
        <div class="col-md-3">
          <button class="btn btn-ea-primary w-100" onclick="loadRoster()">Muat Daftar</button>
        </div>
      </div>
    </div>
    <div id="rosterCard" class="ea-card p-4 d-none">
      <div class="table-responsive">
        <table class="table align-middle">
          <thead><tr><th>Nama</th><th>Status Kehadiran</th><th class="text-end">Aksi Lain</th></tr></thead>
          <tbody id="rosterBody"></tbody>
        </table>
      </div>
      <button class="btn btn-ea-secondary" onclick="saveAttendance()">Simpan Kehadiran</button>
    </div>
  </main>
  <div id="ea-footer"></div>
  <script src="config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    var session = eaRequireLogin(['admin', 'teacher']);
    if (session) {
      eaIncludeHTML('#ea-navbar', 'partials/navbar.html', function () { eaRenderNav(session); });
      eaIncludeHTML('#ea-footer', 'partials/footer.html');
      document.getElementById('attendanceDate').valueAsDate = new Date();
      loadClasses();
      var params = eaGetUrlParams();
      if (params.classId) {
        setTimeout(function () {
          document.getElementById('classSelect').value = params.classId;
          loadRoster();
        }, 600);
      }
    }

    function loadClasses() {
      EA.api('listClasses', [session.token, {}]).then(function (classes) {
        document.getElementById('classSelect').innerHTML = classes.map(function (c) {
          return '<option value="' + c.ClassID + '">' + c.ClassName + ' (Kelas ' + c.Tingkat + ')</option>';
        }).join('');
      });
    }

    function loadRoster() {
      var classId = document.getElementById('classSelect').value;
      var date = document.getElementById('attendanceDate').value;
      if (!classId || !date) { eaToast('error', 'Pilih kelas dan tanggal.'); return; }

      EA.api('listStudentsByClass', [session.token, classId]).then(function (students) {
        EA.api('getAttendanceByClassDate', [session.token, classId, date]).then(function (existing) {
          var byStudent = {};
          existing.forEach(function (a) { byStudent[a.StudentID] = a.Status; });
          document.getElementById('rosterCard').classList.remove('d-none');
          document.getElementById('rosterBody').innerHTML = students.map(function (s) {
            var cur = byStudent[s.StudentID] || 'present';
            var opts = ['present', 'absent', 'sick', 'permit'].map(function (st) {
              return '<option value="' + st + '"' + (st === cur ? ' selected' : '') + '>' + st + '</option>';
            }).join('');
            return '<tr data-student-id="' + s.StudentID + '">' +
              '<td>' + s.fullName + '</td>' +
              '<td><select class="form-select form-select-sm attendance-status">' + opts + '</select></td>' +
              '<td class="text-end"><button class="btn btn-sm btn-outline-secondary" onclick="issueCertFlow(\'' + s.StudentID + '\')">Sertifikat</button></td></tr>';
          }).join('');
        });
      });
    }

    function saveAttendance() {
      var classId = document.getElementById('classSelect').value;
      var date = document.getElementById('attendanceDate').value;
      var records = [];
      document.querySelectorAll('#rosterBody tr').forEach(function (row) {
        records.push({ studentId: row.getAttribute('data-student-id'), status: row.querySelector('.attendance-status').value });
      });
      EA.api('markAttendanceBulk', [session.token, classId, date, records])
        .then(function (r) { if (r.success) eaToast('success', 'Kehadiran disimpan'); else eaToast('error', r.message); });
    }

    function issueCertFlow(studentId) {
      Swal.fire({ title: 'Terbitkan Sertifikat', input: 'text', inputLabel: 'Module ID (cth: MOD-X-01)', confirmButtonText: 'Terbitkan', showCancelButton: true })
        .then(function (r) {
          if (!r.isConfirmed || !r.value) return;
          EA.api('issueCertificate', [session.token, studentId, r.value])
            .then(function (res) {
              if (res.success) eaToast('success', 'Sertifikat diterbitkan: ' + res.certificate.CertificateNumber);
              else eaToast('error', res.message);
            });
        });
    }
  </script>
</body>
</html>
